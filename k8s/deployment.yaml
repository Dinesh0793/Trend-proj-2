apiVersion: apps/v1
kind: Deployment
metadata:
  name: trendify-deployment
  namespace: default
  labels:
    app: trendify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trendify
  template:
    metadata:
      labels:
        app: trendify
    spec:
      containers:
        - name: trendify
          image: dinesh0793/trendify:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: trendify-service
  namespace: default
  labels:
    app: trendify
spec:
  type: LoadBalancer
  selector:
    app: trendify
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 80
